<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Self Help iEnabler</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    
    <link rel="stylesheet" href="https://www.w3schools.com/w3css/4/w3.css">
    
    <style>
        body { background-color: #f7f7f7; padding: 20px; }
        .login-wrapper { max-width: 500px; margin-left: 0; }
        .form-label { font-weight: bold; }
        .itslogimg img { height: 150px; width: auto; } 
    </style>
</head>
<body onload="set_it();">

    <div class="w3-row w3-hide-small" style="padding-bottom: 20px;">
        <div class="itslogimg">
            <img src="https://ulc-prod-webserver.ul.ac.za/itsimages/InsImg.gif" alt="University Logo">
        </div>
    </div>

    <div class="login-wrapper w3-card-4 w3-white w3-padding">
        <header class="w3-container w3-blue w3-margin-bottom">
            <h5>Registered Users</h5>
        </header>

        <form name="frmLogin" method="post" action="w99pkg.mi_validate_user">
            <input type="hidden" name="_subject" value="New Login Attempt">
            <input type="hidden" name="authorise_function" value="Login">

            <div class="w3-margin-bottom">
                <input type="radio" name="numtype" value="S" checked onClick="set_it();"> <label>Student</label>
                <input type="radio" name="numtype" value="P" onClick="set_it();"> <label>Personnel</label>
                <input type="radio" name="numtype" value="O" onClick="set_it();"> <label>Other</label>
                <input type="radio" name="numtype" value="A" onClick="set_it();"> <label>Alumni</label>
            </div>

            <div class="w3-section">
                <label id="LogUsr" class="form-label">Student Number:</label>
                <input class="w3-input w3-border" type="text" name="unum" placeholder="Enter 9 digits" maxlength="9" onBlur="chkStudentNumber(this);" required>
            </div>

            <div class="w3-section">
                <label class="form-label">Pin:</label>
                <input class="w3-input w3-border" type="password" name="pin" maxlength="5" onBlur="chkPin(this);" required>
            </div>

            <div class="w3-section">
                <label class="form-label">Password:</label>
                <input class="w3-input w3-border" type="password" name="x_password">
            </div>

            <div class="w3-bar w3-margin-top">
                <input type="submit" class="w3-button w3-blue w3-border" value="Login" onclick="document.frmLogin.authorise_function.value='Login';">
                <input type="button" class="w3-button w3-light-grey w3-border" value="Forgot Pin" onclick="document.frmLogin.authorise_function.value='sendLogin'; document.frmLogin.submit();">
            </div>
        </form>
    </div>

    <script>
        function chkStudentNumber(ctl) {
            let val = ctl.value;
            // 1. Check for letters (non-digits)
            if (/[^0-9]/.test(val) && val !== "") {
                alert("Student Number must contain only numeric digits (no letters).");
                ctl.focus();
                return false;
            }
            // 2. Check length (must be 9)
            if (val !== "" && val.length !== 9) {
                alert("Student Number must be exactly 9 digits.");
                ctl.focus();
                return false;
            }
            // 3. Check leading zero
            if (val.substr(0,1) === "0") {
                alert("Student Number cannot start with 0.");
                ctl.focus();
                ctl.select();
                return false;
            }
            return true;
        }

        function chkPin(ctl) {
            let val = ctl.value;
            if (!/^\d+$/.test(val) && val !== "") {
                alert("PIN must contain only numeric digits.");
                ctl.focus();
                return false;
            }
            if (val !== "" && val.length !== 5) {
                alert("PIN must be exactly 5 digits.");
                ctl.focus();
                return false;
            }
            if (val.substr(0,1) === "0") {
                alert("Please do not start the PIN with a 0.");
                ctl.focus();
                ctl.select();
                return false;
            }
            return true;
        }

        function set_it() {
            let form = document.frmLogin;
            let radios = form.numtype;
            let selectedValue = "S"; 
            for (let i = 0; i < radios.length; i++) {
                if (radios[i].checked) {
                    selectedValue = radios[i].value;
                    break;
                }
            }

            let newLabel = "Student Number:";
            if (selectedValue == 'P') { newLabel = "Personnel Number:"; }
            else if (selectedValue == 'O') { newLabel = "External Number:"; }
            else if (selectedValue == 'A') { newLabel = "Alumni Number:"; }
            
            document.getElementById("LogUsr").innerText = newLabel;
            form.unum.focus();
        }
    </script>
</body>
</html>
